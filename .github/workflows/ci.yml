name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx biome check

      - name: Build core
        run: npm run build:core

      - name: Test core
        run: npm run test:core

      - name: Build page
        run: npm run build:page

      - name: Build vsc-ext
        run: npm run build:vsc-ext

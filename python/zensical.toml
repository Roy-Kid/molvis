[project]
site_name = "MolVis"
site_description = "Python API for MolVis molecular visualization"
site_author = "molcrafts"
copyright = "Copyright &copy; 2026 molcrafts"

nav = [
  { "Home" = "index.md" },
  { "Quick Start" = "quickstart.md" },
  { "API Reference" = [
    "api/show.md",
    "api/standalone.md",
    "api/jupyter.md",
    "api/commands.md",
  ]},
  { "Development" = "development.md" },
]

[project.theme]
language = "en"
features = [
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.footer",
    "navigation.indexes",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
